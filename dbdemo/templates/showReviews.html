{% extends "global_layout.html" %}
{% block content %}
<div class="container-fluid px-4">
    <div class="row mt-4">
        <div class="col-12">
            <div class="card shadow-sm" style="border-radius:20px;background:rgba(18,49,126,0.18);">
                <div class="card-body">
                    <h2>{{ pageTitle }}</h2>
                    <p><a href="/">Back to landing page</a></p>

                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Manager</th>
                                    <th>Review</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for row in data %}
                                <tr>
                                    <td>{{ row[0] }}</td>
                                    <td>{{ row[1] }}</td>
                                    <td>{{ row[2] }}</td>
                                    <td>{{ row[3] }}</td>
                                    <td style="white-space: normal; word-break: break-word;">{{ row[4] }}</td>
                                    <td>
                                        <a class="btn btn-primary btn-sm" href="/similarity/review/{{ row[0] }}">
                                            Find Similar
                                        </a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
